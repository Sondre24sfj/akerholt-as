<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ============================
         Tittel og SEO 
    ============================ -->
    <title>Akerholt AS – Web development & digitale løsninger</title>
    <meta
      name="description"
      content="Akerholt AS leverer moderne, raske og brukervennlige nettsider og digitale løsninger for små og mellomstore bedrifter. Fullstack-utvikler i Hof, Vestfold."
    />
    <meta
      name="keywords"
      content="Akerholt AS, webutvikling, web development, nettsider, fullstack utvikler, React, Next.js, Hof, Vestfold, VuBrax"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://akerholt-as.no/" />

    <!-- ============================

    ============================ -->
    <link rel="icon" type="image/png" href="/images/hero/A-favicon.png" />
    <link rel="shortcut icon" href="/images/hero/A-favicon.png" />
    <link rel="apple-touch-icon" href="/images/hero/A-favicon.png" />

         Open Graph (Facebook / LinkedIn)
    ============================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Akerholt AS" />
    <meta
      property="og:title"
      content="Akerholt AS – Web development & digitale løsninger"
    />

      property="og:description"
      content="Fullstack-utvikler som bygger moderne, skalerbare og brukervennlige nettsider for bedrifter. Basert i Hof, Vestfold."

    <meta property="og:url" content="https://akerholt-as.no/" />
    <meta
      property="og:image"
      content="https://akerholt-as.no/images/seo/seo-cover.png"
    />
    <meta property="og:locale" content="nb_NO" />

    <!-- ============================
         Twitter Card (X)
    ============================ -->

      name="twitter:title"
      content="Akerholt AS – Web development & digitale løsninger"

      name="twitter:description"

    />
    <meta
      name="twitter:image"
      content="https://akerholt-as.no/images/seo/seo-cover.png"

    ============================ -->
